<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — ติดตามสถานะงาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login gate -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="brand-mark" style="width:52px;height:52px;font-size:18px;margin:0 auto 18px">CP</div>
    <h1>Client Portal</h1>
    <p>เข้าสู่ระบบเพื่อดูสถานะงานและความคืบหน้าของโปรเจกต์</p>

    <div class="login-tabs">
      <button class="login-tab active" data-tab="login">เข้าสู่ระบบ</button>
      <button class="login-tab" data-tab="register">สมัครครั้งแรก</button>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-field full"><input type="email" name="email" placeholder="อีเมล" required></div>
      <div class="form-field full"><input type="password" name="password" placeholder="รหัสผ่าน" required></div>
      <button class="btn btn-primary" type="submit" style="width:100%">เข้าสู่ระบบ</button>
    </form>

    <form id="registerForm" class="login-form" style="display:none">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;text-align:left">ใช้อีเมลที่ทีมงานเพิ่มคุณไว้ในระบบแล้วเท่านั้น (ทีมงานฝั่งเราหรือผู้ติดต่อฝั่งลูกค้า)</p>
      <div class="form-field full"><input type="email" name="email" placeholder="อีเมล" required></div>
      <div class="form-field full"><input type="password" name="password" placeholder="ตั้งรหัสผ่าน (อย่างน้อย 6 ตัวอักษร)" minlength="6" required></div>
      <button class="btn btn-primary" type="submit" style="width:100%">สร้างรหัสผ่านและเข้าใช้งาน</button>
    </form>

    <p class="login-note" id="loginNote"></p>

    <div id="googleLoginBlock" style="display:none">
      <div class="login-divider"><span>หรือ</span></div>
      <a class="btn google-btn" href="/auth/google">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#fff" d="M21.35 11.1H12v2.8h5.35c-.25 1.4-1.6 4.1-5.35 4.1-3.2 0-5.85-2.65-5.85-5.9s2.65-5.9 5.85-5.9c1.85 0 3.05.8 3.75 1.45l2.55-2.45C16.75 3.6 14.6 2.6 12 2.6 6.9 2.6 2.75 6.75 2.75 11.85s4.15 9.25 9.25 9.25c5.35 0 8.9-3.75 8.9-9.05 0-.65-.05-1.15-.15-1.65z"/></svg>
        เข้าสู่ระบบด้วย Google
      </a>
    </div>
  </div>
</div>

<div class="app" id="appShell" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-mark">CP</div>
        <div class="brand-text">
          <strong>Client Portal</strong>
          <span>ระบบติดตามสถานะงาน</span>
        </div>
      </div>
      <button class="icon-btn sidebar-close" id="sidebarClose" aria-label="ปิดเมนู">
        <span class="nav-icon" data-icon="close"></span>
      </button>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="dashboard">
        <span class="nav-icon" data-icon="grid"></span> Dashboard
      </button>
      <button class="nav-item" data-view="tasks">
        <span class="nav-icon" data-icon="list"></span> Task Tracking
      </button>
      <button class="nav-item" data-view="timeline">
        <span class="nav-icon" data-icon="timeline"></span> Timeline
      </button>
      <button class="nav-item" data-view="files">
        <span class="nav-icon" data-icon="file"></span> File &amp; Approval
      </button>
      <button class="nav-item" data-view="revisions">
        <span class="nav-icon" data-icon="revision"></span> Revision Tracking
      </button>
      <button class="nav-item" data-view="delays">
        <span class="nav-icon" data-icon="alert"></span> Delay Report
      </button>
      <button class="nav-item" data-view="contact">
        <span class="nav-icon" data-icon="chat"></span> ติดต่อ &amp; คำขอ
      </button>
    </nav>

    <div class="sidebar-bottom">
      <div class="project-picker">
        <div class="project-picker-head">
          <label>โปรเจกต์</label>
          <div class="project-picker-actions" id="projectPickerActions"></div>
        </div>
        <select id="projectFilter"></select>
      </div>
      <button class="theme-toggle" id="themeToggle">
        <span class="nav-icon" data-icon="sun"></span> <span id="themeLabel">โหมดสว่าง</span>
      </button>
      <button class="theme-toggle" id="logoutBtn">
        <span class="nav-icon" data-icon="close"></span> ออกจากระบบ
      </button>
    </div>
  </aside>

  <div class="scrim" id="scrim"></div>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="เปิดเมนู">
        <span class="nav-icon" data-icon="menu"></span>
      </button>
      <div class="topbar-title">
        <h1 id="viewTitle">Dashboard Progress</h1>
        <p id="viewSubtitle">ภาพรวมความคืบหน้าของทุกโปรเจกต์แบบเรียลไทม์</p>
      </div>
      <div class="topbar-actions">
        <div class="search-box">
          <span class="nav-icon" data-icon="search"></span>
          <input type="text" id="globalSearch" placeholder="ค้นหางาน, ผู้รับผิดชอบ...">
        </div>
        <button class="client-chip" id="clientChipBtn" title="แก้ไขรูปโปรไฟล์">
          <div class="avatar" id="clientChipAvatar">คณ</div>
          <div class="client-chip-text">
            <strong id="clientChipName">คุณลูกค้า</strong>
            <span id="clientChipCompany">Aroi Delight Co., Ltd.</span>
          </div>
        </button>
      </div>
    </header>

    <div class="content" id="content">

      <!-- DASHBOARD -->
      <section class="view active" id="view-dashboard"></section>

      <!-- TASK TRACKING -->
      <section class="view" id="view-tasks"></section>

      <!-- TIMELINE -->
      <section class="view" id="view-timeline"></section>

      <!-- FILES & APPROVAL -->
      <section class="view" id="view-files"></section>

      <!-- REVISION TRACKING -->
      <section class="view" id="view-revisions"></section>

      <!-- DELAY REPORT -->
      <section class="view" id="view-delays"></section>

      <!-- CONTACT & REQUESTS -->
      <section class="view" id="view-contact"></section>

    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Task detail modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="taskModal"></div>
</div>

<script src="app.js"></script>
</body>
</html>
